<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="bootstrap.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">   
    <link rel="stylesheet" href="login.css">
    <!--<script src="./node_modules/socket.io/client-dist/socket.io.js"></script>-->
    <script src="login.js" defer></script>
</head>
<body class="container">
    <header class="row mt-2 mb-2 justify-content-sm-center">
        <picture class="col col-12 col-sm-8 col-md-6 mx-auto">
            <img class="w-100" src="img/logo-groupomania.png" alt="Logo groupomania">
        </picture>
    </header>
    <section class="row mt-3 justify-content-sm-center">
        <form id="connectSocketForm" class="col col-12 col-sm-8 col-md-6 mx-auto">
            <label for="userEmail" class="form-label">Email de l'utilisteur</label>
            <input type="text-area" class="form-control mb-3" id='userEmail' name="userEmail" placeholder="Inscrivez votre adresse email"/>
            <label for="password" class="form-label">Mot de passe</label>
            <div class="input-group mb-3">
                <input type="password" class="form-control" id='password' name="password" placeholder="Inscrivez votre mot de passe"/>
                <span id="eye-show-password" for="show-password-checkbox" class="input-group-text eye-icon-hide bg-primary"></span>
            </div>
            <button id="login-btn" class="btn btn-primary">Se connecter</button>
        </form>
    </div>
</body>
</html>
